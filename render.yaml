services:
  - type: web
    name: ethio-food-api
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit

  - type: web
    name: ethio-food
    runtime: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/build
    autoDeployTrigger: commit
    routes:
      # Client-side routes must load the SPA entrypoint so React Router can render PageNotFound.
      - type: rewrite
        source: /*
        destination: /index.html
